<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="leaflet/leaflet.css">
  <link rel="stylesheet" href="geoman/leaflet-geoman.css">
  <style> html, body, #map { height: 100%; margin: 0; } </style>
</head>
<body>
  <div id="map"></div>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="leaflet/leaflet.js"></script>
  <script src="geoman/leaflet-geoman.min.js"></script>
  <script>
    const map = L.map('map').setView([-34.6, -58.4], 5);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',
                { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);
    map.pm.addControls({ position: 'topleft', drawPolygon: true, drawRectangle: true,
      drawMarker: false, drawPolyline: false, drawCircle: false,
      drawCircleMarker: false, drawText: false });
    let bridge = null;
    new QWebChannel(qt.webChannelTransport, (channel) => { bridge = channel.objects.bridge; });
    map.on('pm:create', (e) => {
      const geom = e.layer.toGeoJSON().geometry;
      if (bridge) bridge.polygon_drawn(JSON.stringify(geom));
    });
  </script>
</body>
</html>
